<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.background = 'red';
        div.style.color = 'white';
        div.style.zIndex = '99999';
        div.style.padding = '10px';
        div.style.fontSize = '14px';
        div.style.direction = 'ltr';
        div.style.textAlign = 'left';
        div.innerHTML = '<strong>Error:</strong> ' + message + ' <br><strong>File:</strong> ' + source + ' <br><strong>Line:</strong> ' + lineno;
        document.body.appendChild(div);
      };
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:,">
    <title>Mini Games for Kids</title>
    <!-- Premium Kid Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <div id="app">

        <!-- Win Overlay (Global) -->
        <div id="message-overlay" class="hidden">
            <div class="win-card">
                <div class="win-emoji">🏆</div>
                <div class="win-title">כל הכבוד!</div>
                <button id="btn-play-again" class="play-again-btn">שחק שוב ⭐</button>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="view active">
            <!-- Animated clouds -->
            <div class="cloud c1">☁️</div>
            <div class="cloud c2">☁️</div>
            <div class="cloud c3">☁️</div>
            <!-- Sun -->
            <div class="sun">☀️</div>
            <!-- Ground -->
            <div class="ground"></div>

            <div class="menu-hero">
                <div class="hero-title">
                    <span class="title-word t1">Mini</span>
                    <span class="title-word t2">Games</span>
                    <span class="title-emoji">🎮</span>
                </div>
                <button id="btn-start-sorting" class="play-btn">
                    <span class="play-btn-icon">🧺</span>
                    <span class="play-btn-text">Sorting Game</span>
                </button>
                <button id="btn-start-literacy" class="play-btn literacy-btn">
                    <span class="play-btn-icon">מ</span>
                    <span class="play-btn-text">אותיות (Letters)</span>
                </button>
            </div>
        </div>

        <!-- Level Map (treasure map, no scroll) -->
        <div id="difficulty-menu" class="view">
            <button id="btn-back-main" class="back-btn">⬅</button>
            <div class="level-map">

                <!-- SVG winding path connecting the nodes -->
                <svg class="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M 22 18 Q 60 25, 75 38 Q 90 52, 25 58 Q 5 62, 22 82 Q 50 90, 80 85"
                          fill="none" stroke="#c8a96e" stroke-width="1.8"
                          stroke-dasharray="3 3" stroke-linecap="round"/>
                    <!-- Footprint decoration dots on path -->
                    <circle cx="40" cy="24" r="1.2" fill="#c8a96e" opacity="0.6"/>
                    <circle cx="68" cy="44" r="1.2" fill="#c8a96e" opacity="0.6"/>
                    <circle cx="25" cy="62" r="1.2" fill="#c8a96e" opacity="0.6"/>
                </svg>

                <div class="level-node" data-level="1" style="top:8%; left:8%">
                    <div class="node-bubble" id="node-1"><span class="node-icon">🎨</span></div>
                    <div class="node-label">Colors</div>
                    <div class="node-stars" id="stars-1"></div>
                </div>

                <div class="level-node" data-level="2" style="top:30%; right:6%">
                    <div class="node-bubble" id="node-2"><span class="node-icon">🔢</span></div>
                    <div class="node-label">Numbers</div>
                    <div class="node-stars" id="stars-2"></div>
                </div>

                <div class="level-node" data-level="3" style="top:55%; left:6%">
                    <div class="node-bubble" id="node-3"><span class="node-icon">🔷</span></div>
                    <div class="node-label">Shapes</div>
                    <div class="node-stars" id="stars-3"></div>
                </div>

                <div class="level-node" data-level="4" style="top:75%; left:35%">
                    <div class="node-bubble" id="node-4"><span class="node-icon">🐾</span></div>
                    <div class="node-label">Categories</div>
                    <div class="node-stars" id="stars-4"></div>
                </div>

            </div>
        </div>

        <!-- Literacy Map (letters game menu) -->
        <div id="literacy-menu" class="view">
            <button id="btn-back-main-lit" class="back-btn">⬅</button>
            <div class="level-map lit-map-bg">

                <!-- SVG winding path connecting the nodes -->
                <svg class="map-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M 20 20 Q 50 30, 80 50 Q 50 70, 20 80"
                          fill="none" stroke="#ff80ab" stroke-width="2.5"
                          stroke-dasharray="4 4" stroke-linecap="round"/>
                </svg>

                <div class="lit-level-node" data-lit-level="1" style="top:15%; left:15%">
                    <div class="node-bubble" id="lit-node-1"><span class="node-icon">👆</span></div>
                    <div class="node-label">גרירה</div>
                    <div class="node-stars" id="lit-stars-1"></div>
                </div>

                <div class="lit-level-node locked" data-lit-level="2" style="top:45%; right:15%">
                    <div class="node-bubble" id="lit-node-2"><span class="node-icon">⭐</span></div>
                    <div class="node-label">מחבואים</div>
                    <div class="node-stars" id="lit-stars-2"></div>
                </div>

                <div class="lit-level-node locked" data-lit-level="3" style="top:75%; left:15%">
                    <div class="node-bubble" id="lit-node-3"><span class="node-icon">🪄</span></div>
                    <div class="node-label">קסם</div>
                    <div class="node-stars" id="lit-stars-3"></div>
                </div>

            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-sorting" class="view">
            <button id="btn-back-menu" class="back-btn">⬅</button>

            <!-- Subtle ambient decorations (gentle, non-distracting) -->
            <div class="game-cloud gc1">☁️</div>
            <div class="game-cloud gc2">☁️</div>
            <div class="game-butterfly">🦋</div>



            <div class="game-container">
                <!-- Top: Drop zones -->
                <div class="drop-zones-area" id="drop-zones-area"></div>
                <!-- Bottom: Items -->
                <div class="spawning-area" id="spawning-area"></div>
            </div>

            <!-- Nature ground strip -->
            <div class="game-ground">
                <span class="grass-deco">🌸</span>
                <span class="grass-deco">🌼</span>
                <span class="grass-deco">🌷</span>
            </div>
        </div>

        <!-- Literacy Game Screen -->
        <div id="game-literacy" class="view">
            <button id="btn-back-menu-lit" class="back-btn">⬅</button>
            <div id="lit-debug-panel" style="position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.8); padding: 5px; border-radius: 5px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                <label style="font-size: 12px; font-weight: bold; margin-right: 5px;">Debug:</label>
                <input type="text" id="lit-debug-input" maxlength="1" placeholder="א" style="width: 30px; text-align: center; font-size: 16px; border: 1px solid #ccc; border-radius: 3px;">
            </div>

            <!-- Animated background decorations -->
            <div class="lit-cloud lc1">☁️</div>
            <div class="lit-cloud lc2">☁️</div>
            <div class="lit-cloud lc3">☁️</div>
            <div class="lit-sparkle"></div>
            <div class="lit-sparkle"></div>
            <div class="lit-sparkle"></div>
            <div class="lit-sparkle"></div>
            <div class="lit-sparkle"></div>
            <div class="lit-hills"></div>
            <div class="lit-flower">🌸</div>
            <div class="lit-flower">🌼</div>
            <div class="lit-flower">🌷</div>
            <div class="lit-flower">🌻</div>
            <div class="lit-flower">🌺</div>

            <div id="lit-stage-1" class="lit-stage active">
                <div class="lit-target-silhouette" id="lit-target-silhouette"></div>
                <div class="lit-draggable-letter" id="lit-drag-letter"></div>
            </div>

            <div id="lit-stage-2" class="lit-stage hidden">
                <div class="lit-item-container">
                    <div class="lit-distractor" id="lit-dist-star">⭐</div>
                    <div class="lit-target-letter" id="lit-seek-letter"></div>
                    <div class="lit-distractor" id="lit-dist-cloud">☁️</div>
                </div>
            </div>

            <div id="lit-stage-3" class="lit-stage hidden">
                <div class="lit-env-object" id="lit-obj-chair" style="top: 20%; left: 10%;">🪑</div>
                <div class="lit-env-object" id="lit-obj-ball" style="top: 70%; right: 15%;">⚽</div>
                <div class="lit-env-object" id="lit-obj-bed" style="top: 50%; left: 40%;">🛏️</div>
                <div class="lit-magic-wand" id="lit-wand-letter"></div>
            </div>
            
            <div id="lit-particles-container"></div>
        </div>

    </div>
    <script src="app.js?v=4"></script>
    <script src="literacy.js?v=26"></script>
</body>
</html>
